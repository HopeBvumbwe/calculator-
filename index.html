<!DOCTYPE html>
<html>
<head>  </head>  
<body>  
<input type="text" id="calDisplay"><br>
<button onclick="clearDisplay()">Clear</button><br>

<button onclick="dolo(9)">9</button>
<button onclick="dolo(8)">8</button>
<button onclick="dolo(7)">7</button>
<button onclick="dolo('+')" >+</button><br>

<button onclick="dolo(6)">6</button>
<button onclick="dolo(5)">5</button>
<button onclick="dolo(4)">4</button>
<button onclick="dolo('-')">-</button><br>

<button onclick="dolo(3)">3</button>
<button onclick="dolo(2)">2</button>
<button onclick="dolo(1)">1</button>
<button onclick="dolo('*')">*</button><br>

<button onclick="dolo(0)">0</button>
<button onclick="dolo('.')">.</button>
<button onclick="squareRoot()">√</button>
<button onclick="dolo('/')">/</button><br>

<button onclick="dolo('**')">^</button>
<button onclick="dolo('(')">(</button>
<button onclick="dolo(')')">)</button>
<button onclick="calculate()">=</button>

<script>
 function dolo(num)
{
const doloshow = document.getElementById('calDisplay');
doloshow.value += num;
}

function clearDisplay(){
    const variabo = document.getElementById("calDisplay")
    variabo.value='';
}
function calculate() {
    const display = document.getElementById("calDisplay");

    try {
        display.value = eval(display.value);
    } catch {
        display.value = "Error";
    }
}
function squareRoot() {
    const display = document.getElementById("calDisplay");

    display.value = Math.sqrt(Number(display.value));
}
</script>

</body>
</html>
